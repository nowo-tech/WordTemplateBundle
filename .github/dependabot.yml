version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      symfony:
        patterns:
          - "symfony/*"
      phpstan:
        patterns:
          - "phpstan/*"
          - "phpstan-*/*"
    commit-message:
      prefix: "composer"
