; Recheck compiled PHP files every request so Twig-compiled templates in var/cache are always fresh
opcache.revalidate_freq=0

; FrankenPHP Caddyfile also sets max_execution_time via php_ini; this is the fallback for CLI/tools.
; Keep above PROCESS_TIMEOUT / nowo_word_template.timeout (default 180) — see docs/DEMO-FRANKENPHP.md.
max_execution_time=240
max_input_time=240
