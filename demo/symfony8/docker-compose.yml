name: word-template-bundle-demo-symfony-8

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: word-template-bundle-demo-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8021}:80"
    volumes:
      - .:/app
      - ../..:/var/word-template-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=${APP_ENV:-dev}
      - APP_DEBUG=${APP_DEBUG:-1}
      - APP_SECRET=${APP_SECRET:-demo-secret}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - word-template-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  word-template-demo-network:
    driver: bridge
