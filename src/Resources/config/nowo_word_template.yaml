# Example: copy to config/packages/nowo_word_template.yaml in your Symfony application.
# Delimiter settings for .docx template placeholders and conditional blocks.
# Values must match what template authors type in Microsoft Word (see docs/USAGE.md).

nowo_word_template:
    # Wall-clock timeout (seconds) for WordTemplateProcessor::process().
    # Applied as a cooperative deadline between merge phases plus set_time_limit.
    # Prefer '%env(int:PROCESS_TIMEOUT)%' (shared Nowo default 180). Keep below PHP
    # max_execution_time and the reverse-proxy write timeout (FrankenPHP / REQ-RUNTIME-001).
    timeout: 180

    # Opening delimiter for scalar, nested, HTML, image, and table-row placeholders.
    # Used by PHPWord TemplateProcessor (setValue, setImageValue, cloneRow, etc.).
    macro_opening: '${'

    # Closing delimiter for placeholders (pairs with macro_opening).
    macro_closing: '}'

    # Prefix for conditional block opening markers; the block name follows after a space.
    # Full marker example: ${#if optional_funding}
    # Resolved in PHP via ConditionalBlock — nested blocks are supported (inside-out).
    conditional_if_opening: '${#if'

    # Suffix that closes the conditional opening marker (after the block name).
    conditional_if_closing: '}'

    # Prefix for conditional block closing markers; the block name follows after a space.
    # Full marker example: ${#endif optional_funding}
    conditional_endif_opening: '${#endif'

    # Suffix that closes the conditional end marker (after the block name).
    conditional_endif_closing: '}'
